spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/notes_db
    username: notes_admin
    password: notes_secret
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
  data:
    redis:
      host: localhost
      port: 6379
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: true
    consumer:
      group-id: notes-api
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"


app:
  jwt:
    secret: 422Hj7MmbEKtmeJZcGN6qs40jAkXra8Few+8+S2Wrqs=
    access-token-expiration: 3600000       # 1 hour in ms
    refresh-token-expiration: 2592000000  # 30 days in ms